<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Corps / tunique bleue -->
  <path d="M60 130 Q65 115 75 110 L125 110 Q135 115 140 130 L145 200 H55 Z" fill="#4a6fa5"/>
  <path d="M75 110 Q100 105 125 110" fill="none" stroke="#3a5a8a" stroke-width="1"/>

  <!-- Col de la tunique -->
  <path d="M80 110 Q100 120 120 110" fill="#5a80b5" stroke="none"/>

  <!-- Tête -->
  <ellipse cx="100" cy="78" rx="30" ry="35" fill="#f5d5b0"/>

  <!-- Cheveux blancs sur les côtés (touffes Maestro) -->
  <ellipse cx="73" cy="74" rx="8" ry="18" fill="white"/>
  <ellipse cx="127" cy="74" rx="8" ry="18" fill="white"/>
  <!-- Dessus du crâne chauve / légèrement rose -->
  <ellipse cx="100" cy="52" rx="26" ry="16" fill="#f8dfc0"/>

  <!-- Quelques mèches blanches sur le dessus -->
  <path d="M78 55 Q85 42 95 48" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M105 48 Q115 42 122 55" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Sourcils blancs broussailleux (signature Maestro) -->
  <path d="M80 66 Q87 58 96 66" fill="white" stroke="none"/>
  <path d="M104 66 Q113 58 120 66" fill="white" stroke="none"/>

  <!-- Yeux petits et bienveillants -->
  <ellipse cx="88" cy="72" rx="3.5" ry="4" fill="#3a2e1f"/>
  <ellipse cx="112" cy="72" rx="3.5" ry="4" fill="#3a2e1f"/>
  <circle cx="89.5" cy="70.5" r="1.5" fill="white"/>
  <circle cx="113.5" cy="70.5" r="1.5" fill="white"/>

  <!-- Nez rond caractéristique -->
  <ellipse cx="100" cy="82" rx="5" ry="4.5" fill="#e8c5a0" stroke="#d4a87a" stroke-width="1"/>

  <!-- Moustache blanche tombante -->
  <path d="M88 88 Q80 84 72 90" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M112 88 Q120 84 128 90" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M88 88 Q100 92 112 88" fill="white" stroke="none"/>

  <!-- Grande barbe blanche longue (signature Maestro) -->
  <path d="M72 90 Q68 110 65 140 Q80 170 100 175 Q120 170 135 140 Q132 110 128 90" fill="white"/>
  <!-- Ondulations de la barbe -->
  <path d="M75 105 Q88 115 100 105 Q112 115 125 105" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>
  <path d="M73 120 Q87 130 100 120 Q113 130 127 120" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>
  <path d="M72 135 Q86 145 100 135 Q114 145 128 135" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>
  <path d="M75 150 Q88 158 100 150 Q112 158 125 150" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>
  <!-- Pointe de la barbe -->
  <path d="M85 165 Q100 180 115 165" fill="none" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Bouche souriante (entre moustache et barbe) -->
  <path d="M92 93 Q100 97 108 93" fill="none" stroke="#c4856a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bras gauche (geste d'explication, main ouverte) -->
  <path d="M60 130 Q48 140 52 155" fill="none" stroke="#4a6fa5" stroke-width="12" stroke-linecap="round"/>
  <path d="M52 155 Q48 150 44 152 Q42 156 46 158 Q50 160 54 157 Z" fill="#f5d5b0"/>

  <!-- Bras droit tenant un livre -->
  <path d="M140 130 Q152 140 148 155" fill="none" stroke="#4a6fa5" stroke-width="12" stroke-linecap="round"/>
  <circle cx="148" cy="158" r="6" fill="#f5d5b0"/>
  <!-- Livre ouvert -->
  <rect x="136" y="155" rx="2" ry="2" width="12" height="16" fill="#f5efe0" stroke="#8b1a1a" stroke-width="1.5" transform="rotate(-5 142 163)"/>
  <rect x="148" y="155" rx="2" ry="2" width="12" height="16" fill="#f5efe0" stroke="#8b1a1a" stroke-width="1.5" transform="rotate(5 154 163)"/>
  <line x1="148" y1="155" x2="148" y2="171" stroke="#8b1a1a" stroke-width="1.5"/>
</svg>
