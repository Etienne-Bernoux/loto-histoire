<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loto d'Histoire</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%238b1a1a'/><text x='16' y='23' font-size='18' text-anchor='middle' fill='%23f5efe0' font-family='serif' font-weight='bold'>H</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Loto d'Histoire</h1>
    <p class="subtitle">Apprends l'histoire de France en jouant !</p>
  </header>

  <main>
    <!-- Écran d'accueil -->
    <section id="ecran-accueil" class="ecran">
      <!-- Maestro + message d'accueil -->
      <div id="zone-maestro" class="accueil-maestro"></div>

      <!-- Stats rapides -->
      <div id="zone-stats" class="accueil-stats"></div>

      <!-- Défi du jour -->
      <div id="zone-defi" class="accueil-defi"></div>

      <!-- Progression -->
      <div id="zone-progression"></div>

      <h2>Choisis ton étape</h2>
      <div class="etapes">
        <button class="btn-etape" id="btn-decouvrir">
          <span class="etape-numero">1</span>
          <span class="etape-titre">Découvrir</span>
          <span class="etape-desc">Explore les cartes, lis les anecdotes et imprègne-toi de l'histoire.</span>
        </button>
        <button class="btn-etape" id="btn-associer">
          <span class="etape-numero">2</span>
          <span class="etape-titre">Associer</span>
          <span class="etape-desc">Fais le lien entre les dates et les événements.</span>
        </button>
        <button class="btn-etape" id="btn-restituer">
          <span class="etape-numero">3</span>
          <span class="etape-titre">Restituer</span>
          <span class="etape-desc">Retrouve les dates de mémoire, sans aide !</span>
        </button>
      </div>
    </section>

    <!-- Étape 1 : Découvrir -->
    <section id="ecran-decouvrir" class="ecran cache">
      <div class="jeu-header">
        <button class="btn btn-retour btn-retour-accueil">Retour</button>
        <h2>Découvrir</h2>
        <div></div>
      </div>
    </section>

    <!-- Étape 2 : Associer -->
    <section id="ecran-associer" class="ecran cache">
      <div class="jeu-header">
        <button class="btn btn-retour btn-retour-accueil">Retour</button>
        <h2>Associer</h2>
        <div></div>
      </div>
    </section>

    <!-- Étape 3 : Restituer -->
    <section id="ecran-restituer" class="ecran cache">
      <div class="jeu-header">
        <button class="btn btn-retour btn-retour-accueil">Retour</button>
        <h2>Restituer</h2>
        <div></div>
      </div>
    </section>

    <!-- Écran de fin -->
    <section id="ecran-fin" class="ecran cache">
      <div class="fin-contenu">
        <h2 id="fin-titre"></h2>
        <p id="fin-message"></p>
        <div id="fin-details"></div>
        <div class="fin-actions">
          <button id="fin-rejouer" class="btn btn-principal">Rejouer</button>
          <button class="btn btn-retour-accueil">Retour à l'accueil</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>Loto d'Histoire &mdash; Un jeu éducatif pour apprendre les grandes dates</p>
  </footer>

  <script type="module" src="src/ui/app.js"></script>
</body>
</html>
